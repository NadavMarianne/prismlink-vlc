name: Build C Core

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
        
      - name: Build and Test
        run: |
          cd c_core
          chmod +x ./scripts/run_tests.sh
          ./scripts/run_tests.sh